<!doctype html>
<html lang="en-us">
<head>
    <meta charSet="utf-8"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <title>App Name / localhost</title>
    <meta name="description" content="App Description"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" type="text/css"
          href="https://intranet.chums.com/node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css"
          href="https://intranet.chums.com/node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="https://intranet.chums.com/css/intranet.css">
    <link rel="stylesheet" type="text/css" href="https://intranet.chums.com/css/chums.css">
    <link rel="icon" type="image/x-icon" href="https://intranet.chums.com/favicon.ico"/>
    <script src="https://intranet.chums.com/js/preferred-theme.js"></script>
</head>
<body>
<header class="site-header">
    <nav class="navbar navbar-chums navbar-expand-lg navbar-light bg-body-tertiary scroll-top justify-content-between">
        <div class="site-logo">
            <div class="logo-center">
                <a href="/">
                    <img class="logo" id="navbar-logo" alt="Chums Logo"
                         src="https://intranet.chums.com/images/logos/Chums-Logo-Badge-Red-RGB.png"
                         style="margin-top: 0;">
                </a>
            </div>
        </div>
        <div>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="user-profile nav-link dropdown-toggle" id="menu-favorites" role="button" data-bs-auto-close="true" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">User</a>
                    <div class="dropdown-menu dropdown-menu-start dropdown-menu-end dropdown-menu-right" aria-labelledby="menu-favorites">
                        <a class="dropdown-item">Logout</a>
                        <a class="dropdown-item">Change Password</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item">Add to Favorites</a>
                        <div class="dropdown-divider"></div>
                    </div>
                </li>
                <li class="nav-item dropdown">
                    <button class="btn btn-link nav-link px-0 px-lg-2 py-2 dropdown-toggle d-flex align-items-center"
                            id="bd-theme" type="button" data-bs-toggle="dropdown" data-bs-display="static"
                            aria-expanded="false" aria-label="Toggle Theme (light)"><span
                            class="theme-icon-active bi-sun-fill" aria-hidden="true"></span><span class="d-lg-none ms-2"
                                                                                                  id="bd-theme-text">Toggle Theme</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="bd-theme-text">
                        <li>
                            <button class="dropdown-item d-flex align-items-center active" type="button"
                                    data-bs-theme-value="light" aria-pressed="true" data-theme-icon="bi-sun-fill"><span
                                    class="bi-sun-fill me-2 opacity-50" aria-hidden="true"></span><span>Light</span><span
                                    class="ms-auto d-none bi-check2" aria-hidden="true"></span></button>
                        </li>
                        <li>
                            <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="dark"
                                    aria-pressed="false" data-theme-icon="bi-moon-fill"><span
                                    class="bi-moon-fill me-2 opacity-50" aria-hidden="true"></span><span>Dark</span><span
                                    class="ms-auto d-none bi-check2" aria-hidden="true"></span></button>
                        </li>
                        <li>
                            <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="auto"
                                    aria-pressed="false" data-theme-icon="bi-circle-half"><span
                                    class="bi-circle-half me-2 opacity-50" aria-hidden="true"></span><span>Auto</span><span
                                    class="ms-auto d-none bi-check2" aria-hidden="true"></span></button>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>
</header>
<main class="container">
    <div>
        <div>
            <h1 id="top-title">App Title</h1>
            <div id="PageDescription">
                <span id="PageDescriptionText"></span>
            </div>
        </div>
    </div>
    <div id="app">
        <div class="alert alert-info"><strong>Loading</strong> app.</div>
    </div>
</main>
<script type="module" src="/src/index.tsx"></script>
<script src="https://intranet.chums.com/node_modules/jquery/dist/jquery.min.js"></script>
<script src="https://intranet.chums.com/node_modules/@popperjs/core/dist/umd/popper.js"></script>
<script src="https://intranet.chums.com/node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
<script src="https://intranet.chums.com/js/chums-ui.js"></script>

</body>
</html>
